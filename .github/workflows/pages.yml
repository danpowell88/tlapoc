name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to deploy to Pages via OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on (in "GitHub Actions" mode) if it isn't already
          enablement: true

      - name: Rebuild backlog manifest
        # Re-index the hand-authored Backlog.md task files so backlog.html stays current.
        run: python scripts/backlog_manifest.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
