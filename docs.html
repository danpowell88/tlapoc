// Make flowchart node labels Mermaid-11-safe: quote bracket/brace labels so
// special chars (parens, slashes, arrows) don't break the parser. Edge labels are left alone.
function mmQuote(src){
  var lines=src.split("\n");
  var head=(lines.filter(function(l){return l.trim();})[0]||"");
  if(!/^\s*(flowchart|graph)\b/.test(head))return src; // only flowcharts; leave sequence/other untouched
  return lines.map(function(line){
    if(/^\s*(flowchart|graph)\b/.test(line))return line;
    var store=[];
    function stash(s){store.push(s);return ""+(store.length-1)+"";}
    function q(t){t=t.trim();if(t.charAt(0)==='"')return t;return '"'+t.replace(/"/g,"#quot;")+'"';}
    var L=line;
    L=L.replace(/\(\[([^\]]*?)\]\)/g,function(m,t){return stash("(["+q(t)+"])");});
    L=L.replace(/\[\(([^)]*?)\)\]/g,function(m,t){return stash("[("+q(t)+")]");});
    L=L.replace(/\[\[([^\]]*?)\]\]/g,function(m,t){return stash("[["+q(t)+"]]");});
    L=L.replace(/\{\{([^}]*?)\}\}/g,function(m,t){return stash("{{"+q(t)+"}}");});
    L=L.replace(/\[([^\]]*?)\]/g,function(m,t){return stash("["+q(t)+"]");});
    L=L.replace(/\{([^}]*?)\}/g,function(m,t){return stash("{"+q(t)+"}");});
    L=L.replace(/(\d+)/g,function(m,i){return store[+i];});
    return L;
  }).join("\n");
}

}

// ---- interactive 3D enclosure viewer (mounts into <div class="viewer3d">) ----
var _v3dCleanups=[];
function unmountViewers(){_v3dCleanups.forEach(function(fn){try{fn();}catch(e){}});_v3dCleanups=[];}
function mountViewers(){
  content.querySelectorAll(".viewer3d").forEach(function(host){
    if(host.dataset.mounted)return; host.dataset.mounted="1";
    if(!window.THREE){host.innerHTML='<p class="v3d-tag" style="position:static;background:none">3D viewer needs WebGL / network access to three.js.</p>';return;}
    try{build3D(host);}catch(e){host.innerHTML='<p class="v3d-tag" style="position:static;background:none">3D viewer failed to start ('+e+').</p>';}
  });
}
function build3D(host){
  var T=window.THREE;
  var W=host.clientWidth||760, H=Math.max(320,Math.round(W*0.52));
  var scene=new T.Scene();
  var cam=new T.PerspectiveCamera(36,W/H,1,4000);
  var renderer=new T.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(W,H); host.appendChild(renderer.domElement);
  scene.add(new T.HemisphereLight(0xffffff,0x9fb0c0,0.95));
  var key=new T.DirectionalLight(0xffffff,0.85); key.position.set(80,120,70); scene.add(key);
  var fill=new T.DirectionalLight(0xffffff,0.35); fill.position.set(-90,40,-60); scene.add(fill);

  var root=new T.Group(); scene.add(root); root.position.y=4;

  // ---- shared materials & helpers ----
  var mCase =new T.MeshStandardMaterial({color:0xf4f6f9,roughness:0.55,metalness:0.04});
  var mLid  =new T.MeshStandardMaterial({color:0xe7ecf2,roughness:0.45,metalness:0.04,transparent:true,opacity:1});
  var mPort =new T.MeshStandardMaterial({color:0x1f2937,roughness:0.6});
  var mPcb  =new T.MeshStandardMaterial({color:0x0e7468,roughness:0.65});
  var mMetal=new T.MeshStandardMaterial({color:0x9aa6b2,roughness:0.35,metalness:0.7});
  var mCable=new T.MeshStandardMaterial({color:0x111827,roughness:0.7});
  var mScreen=new T.MeshStandardMaterial({color:0x0b1220,roughness:0.3,emissive:0x0a3b66,emissiveIntensity:0.6});
  var mLed  =new T.MeshStandardMaterial({color:0x22c55e,emissive:0x16a34a,emissiveIntensity:1.1});
  var mMag  =new T.MeshStandardMaterial({color:0xef4444,roughness:0.5,metalness:0.2});
  var mBatt =new T.MeshStandardMaterial({color:0xc7d2fe,roughness:0.4,metalness:0.3});
  var mPink =new T.MeshStandardMaterial({color:0xec4899,roughness:0.5});
  function box(w,h,d,m,x,y,z){var g=new T.Mesh(new T.BoxGeometry(w,h,d),m);g.position.set(x||0,y||0,z||0);return g;}
  function cyl(r1,r2,h,m,seg){return new T.Mesh(new T.CylinderGeometry(r1,r2,h,seg||24),m);}

  // ---- model A: fridge temperature monitor (TM-01) ----
  function enclosureModel(){
    var OX=72, OZ=50, BASE=22, LID=8, WALL=2.5, fb=BASE/2;
    var baseGrp=new T.Group(), lidGrp=new T.Group(), pcbGrp=new T.Group(), probeGrp=new T.Group();
    root.add(baseGrp,lidGrp,pcbGrp,probeGrp);
    baseGrp.add(box(OX,WALL,OZ,mCase,0,-fb+WALL/2,0));                 // floor
    baseGrp.add(box(OX,BASE,WALL,mCase,0,0,-OZ/2+WALL/2));             // back wall
    baseGrp.add(box(OX,BASE,WALL,mCase,0,0, OZ/2-WALL/2));             // front wall
    baseGrp.add(box(WALL,BASE,OZ,mCase, OX/2-WALL/2,0,0));             // right wall (gland)
    baseGrp.add(box(WALL,BASE,OZ,mCase,-OX/2+WALL/2,0,0));             // left wall (USB-C)
    [[OX/2-9,OZ/2-9],[OX/2-9,-OZ/2+9],[-OX/2+9,OZ/2-9],[-OX/2+9,-OZ/2+9]].forEach(function(p){
      var s=cyl(2,2,7,mCase); s.position.set(p[0],-fb+WALL+3.5,p[1]); baseGrp.add(s);
    });
    [ OZ/2+6, -OZ/2-6 ].forEach(function(zc){
      var ear=box(OX*0.5,WALL,12,mCase,0,-fb+WALL/2,zc); baseGrp.add(ear);
      [-OX*0.18,OX*0.18].forEach(function(xc){var h=cyl(2.1,2.1,WALL+0.4,mPort); h.position.set(xc,-fb+WALL/2,zc); baseGrp.add(h);});
    });
    baseGrp.add(box(2,3.4,9,mPort,-OX/2+WALL/2,-fb+WALL+5,0));         // USB-C cutout
    var gland=cyl(4.5,5.5,7,mMetal); gland.rotation.z=Math.PI/2; gland.position.set(OX/2+3,-fb+WALL+5,0); baseGrp.add(gland);
    var glnut=cyl(5.5,5.5,2.5,mMetal); glnut.rotation.z=Math.PI/2; glnut.position.set(OX/2+7,-fb+WALL+5,0); baseGrp.add(glnut);
    lidGrp.add(box(OX,LID-2,OZ,mLid,0,BASE/2+(LID-2)/2,0));
    lidGrp.add(box(OX+1.5,2,OZ+1.5,mLid,0,BASE/2-1,0));               // lip
    lidGrp.add(box(26,1.2,14,mScreen,-8,BASE/2+LID-2+0.4,-6));        // OLED window
    var led=cyl(1.3,1.3,1.4,mLed); led.position.set(20,BASE/2+LID-2+0.4,16); lidGrp.add(led);
    lidGrp.add(box(40,0.6,3,mPort,0,BASE/2+LID-2+0.5,20));            // vent slot
    pcbGrp.add(box(34,1.6,18,mPcb,0,-fb+WALL+7,0));
    pcbGrp.add(box(8,3,9,mMetal,-OX/2+WALL+8,-fb+WALL+8.5,0));        // shield/usb block
    pcbGrp.add(box(7,2,5,mPort,-OX/2+WALL+3.2,-fb+WALL+8,0));         // usb-c connector
    pcbGrp.add(box(10,0.6,16,mPort,12,-fb+WALL+8,0));                 // pcb antenna trace
    pcbGrp.add(box(6,2,4,mPort,4,-fb+WALL+9,-6));                     // DS18B20 module
    var cable=cyl(1.4,1.4,40,mCable); cable.rotation.z=Math.PI/2; cable.position.set(OX/2+24,-fb+WALL+5,0); probeGrp.add(cable);
    var tip=cyl(2.4,2.4,12,mMetal); tip.position.set(OX/2+46,-fb-8,0); probeGrp.add(tip);
    var bottle=new T.Mesh(new T.CylinderGeometry(8,8,22,28),new T.MeshStandardMaterial({color:0x67e8f9,roughness:0.1,metalness:0,transparent:true,opacity:0.45}));
    bottle.position.set(OX/2+46,-fb-7,0); probeGrp.add(bottle);
    return {
      explode:function(ex){lidGrp.position.y=ex*46; pcbGrp.position.y=ex*20; probeGrp.position.x=ex*30; probeGrp.position.y=ex*-6;},
      ghost:function(on){mLid.opacity=on?0.28:1;},
      tag:"Enclosure 72 × 50 × 30 mm · ABS · IP54", floorY:-fb
    };
  }

  // ---- model B: S4 cabinet access & tamper monitor (CM-01) ----
  function cabinetModel(){
    var OX=66, OZ=46, BASE=26, LID=8, WALL=2.5, fb=BASE/2;
    var baseGrp=new T.Group(), lidGrp=new T.Group(), pcbGrp=new T.Group(), battGrp=new T.Group(), antGrp=new T.Group();
    root.add(baseGrp,lidGrp,pcbGrp,battGrp,antGrp);
    baseGrp.add(box(OX,WALL,OZ,mCase,0,-fb+WALL/2,0));                 // floor
    baseGrp.add(box(OX,BASE,WALL,mCase,0,0,-OZ/2+WALL/2));             // back wall (mounts to cabinet)
    baseGrp.add(box(OX,BASE,WALL,mCase,0,0, OZ/2-WALL/2));             // front wall
    baseGrp.add(box(WALL,BASE,OZ,mCase, OX/2-WALL/2,0,0));             // right wall (U.FL antenna)
    baseGrp.add(box(WALL,BASE,OZ,mCase,-OX/2+WALL/2,0,0));             // left wall (USB-C)
    [[OX/2-9,OZ/2-9],[OX/2-9,-OZ/2+9],[-OX/2+9,OZ/2-9],[-OX/2+9,-OZ/2+9]].forEach(function(p){
      var s=cyl(2,2,7,mCase); s.position.set(p[0],-fb+WALL+3.5,p[1]); baseGrp.add(s);
    });
    baseGrp.add(box(OX*0.7,7,WALL,mCase,0,2,-OZ/2-1));                 // back mounting plate
    [-OX*0.22,OX*0.22].forEach(function(xc){var h=cyl(1.8,1.8,WALL+0.4,mPort); h.rotation.x=Math.PI/2; h.position.set(xc,2,-OZ/2-1); baseGrp.add(h);});
    baseGrp.add(box(2,3.4,9,mPort,-OX/2+WALL/2,-fb+WALL+5,0));         // USB-C cutout
    var ufl=cyl(2.4,2.4,5,mMetal); ufl.rotation.z=Math.PI/2; ufl.position.set(OX/2+1.5,fb-8,0); baseGrp.add(ufl); // U.FL bulkhead
    lidGrp.add(box(OX,LID-2,OZ,mLid,0,BASE/2+(LID-2)/2,0));
    lidGrp.add(box(OX+1.5,2,OZ+1.5,mLid,0,BASE/2-1,0));               // lip
    var led=cyl(1.3,1.3,1.4,mLed); led.position.set(22,BASE/2+LID-2+0.4,15); lidGrp.add(led);
    lidGrp.add(box(5,0.8,16,mScreen,-15,BASE/2+LID-2+0.4,0));         // light-pipe window
    lidGrp.add(box(6,4,4,mPink,-OX/2+12,BASE/2-3,-OZ/2+9));           // NC lid tamper switch (underside)
    pcbGrp.add(box(34,1.6,16,mPcb,0,-fb+WALL+7,-4));
    pcbGrp.add(box(8,3,9,mMetal,-OX/2+WALL+8,-fb+WALL+8.5,-4));       // usb/shield block
    pcbGrp.add(box(7,2,5,mPort,-OX/2+WALL+3.2,-fb+WALL+8,-4));        // usb-c
    pcbGrp.add(box(5,2.5,4,mPort,OX/2-WALL-7,-fb+WALL+9,-4));         // Hall sensor (near right wall)
    pcbGrp.add(box(4,2,4,mScreen,6,-fb+WALL+9,-9));                   // LIS3DH accelerometer
    pcbGrp.add(box(4,2,4,mScreen,-4,-fb+WALL+9,-9));                  // BH1750 light sensor
    pcbGrp.add(box(6,0.6,12,mPort,13,-fb+WALL+8,4));                  // U.FL pad / antenna trace
    var batt=cyl(7,7,55,mBatt,28); batt.rotation.z=Math.PI/2; batt.position.set(0,-fb+WALL+9,12); battGrp.add(batt); // 18650
    battGrp.add(box(12,5,16,mPort,-26,-fb+WALL+7,12));               // TP4056 module
    var coax=cyl(1.2,1.2,28,mCable); coax.rotation.z=Math.PI/2; coax.position.set(OX/2+16,fb-8,0); antGrp.add(coax); // coax out
    var ant=cyl(1.8,1.8,30,mPcb); ant.position.set(OX/2+30,fb+5,0); antGrp.add(ant);                                // external antenna rod
    antGrp.add(box(5,9,5,mMag,OX/2+7,-fb+WALL+9,-4));               // door magnet (outside, aligned to Hall)
    return {
      explode:function(ex){lidGrp.position.y=ex*50; pcbGrp.position.y=ex*24; battGrp.position.y=ex*11; battGrp.position.z=ex*18; antGrp.position.x=ex*26;},
      ghost:function(on){mLid.opacity=on?0.26:1;},
      tag:"Enclosure 66 × 46 × 34 mm · ABS · sealed inside cabinet", floorY:-fb
    };
  }

  var model = (host.dataset.model==="cabinet") ? cabinetModel() : enclosureModel();

  // ground shadow plane
  var sh=new T.Mesh(new T.CircleGeometry(120,40),new T.MeshBasicMaterial({color:0x0f172a,transparent:true,opacity:0.06}));
  sh.rotation.x=-Math.PI/2; sh.position.y=model.floorY-19.5; scene.add(sh);

  // ---- camera / orbit ----
  var rot={x:-0.5,y:0.7}, dist=180, target=new T.Vector3(0,0,0);
  function place(){
    cam.position.x=target.x+dist*Math.cos(rot.x)*Math.sin(rot.y);
    cam.position.y=target.y+dist*Math.sin(rot.x);
    cam.position.z=target.z+dist*Math.cos(rot.x)*Math.cos(rot.y);
    cam.lookAt(target);
  }
  var cv=renderer.domElement, drag=false, px=0, py=0, auto=true;
  cv.addEventListener("pointerdown",function(e){drag=true;auto=false;px=e.clientX;py=e.clientY;cv.setPointerCapture(e.pointerId);});
  cv.addEventListener("pointermove",function(e){if(!drag)return;rot.y-=(e.clientX-px)*0.01;rot.x+=(e.clientY-py)*0.01;rot.x=Math.max(-1.45,Math.min(1.45,rot.x));px=e.clientX;py=e.clientY;});
  cv.addEventListener("pointerup",function(e){drag=false;});
  cv.addEventListener("wheel",function(e){e.preventDefault();dist=Math.max(95,Math.min(360,dist+e.deltaY*0.18));},{passive:false});

  // ---- toolbar ----
  var bar=document.createElement("div"); bar.className="v3d-bar";
  function mkBtn(label,fn){var b=document.createElement("button");b.textContent=label;b.onclick=function(){fn(b);};bar.appendChild(b);return b;}
  var exploded=false, ghost=false;
  mkBtn("Exploded view",function(b){exploded=!exploded;b.classList.toggle("on",exploded);});
  mkBtn("Ghost lid",function(b){ghost=!ghost;b.classList.toggle("on",ghost);});
  var spinBtn=mkBtn("Auto-spin",function(b){auto=!auto;b.classList.toggle("on",auto);}); spinBtn.classList.add("on");
  mkBtn("Reset",function(){rot={x:-0.5,y:0.7};dist=180;exploded=false;ghost=false;auto=true;bar.querySelectorAll("button").forEach(function(b,i){b.classList.toggle("on",i===2);});});
  host.appendChild(bar);
  var hint=document.createElement("div"); hint.className="v3d-hint"; hint.textContent="drag to rotate · scroll to zoom"; host.appendChild(hint);
  var tag=document.createElement("div"); tag.className="v3d-tag"; tag.textContent=model.tag; host.appendChild(tag);

  // ---- animate (pauses GPU work when scrolled off-screen) ----
  var ex=0, raf=0, alive=true, visible=true;
  var io=new IntersectionObserver(function(es){visible=es[0].isIntersecting;},{threshold:0.01});
  io.observe(host);
  function frame(){
    if(!alive)return; raf=requestAnimationFrame(frame);
    if(!visible)return;
    if(auto&&!drag)rot.y+=0.005;
    var tgt=exploded?1:0; ex+=(tgt-ex)*0.12;
    model.explode(ex); model.ghost(ghost);
    place(); renderer.render(scene,cam);
  }
  function onResize(){var w=host.clientWidth||W,h=Math.max(320,Math.round(w*0.52));cam.aspect=w/h;cam.updateProjectionMatrix();renderer.setSize(w,h);}
  window.addEventListener("resize",onResize);
  frame();
  _v3dCleanups.push(function(){alive=false;cancelAnimationFrame(raf);io.disconnect();window.removeEventListener("resize",onResize);renderer.dispose();});
}
(function buildSide(){let g=null;DOCS.forEach(d=>{if(d.g!==g){g=d.g;const h=document.createElement("div");h.className="grp";h.textContent=g;side.appendChild(h);}const a=document.createElement("a");a.textContent=d.t;a.href="#"+d.p;a.dataset.p=d.p;side.appendChild(a);});})();
function active(p){side.querySelectorAll("a").forEach(a=>a.classList.toggle("on",a.dataset.p===p));}
async function show(p){
  active(p);unmountViewers();content.innerHTML="Loading…";
  try{const md=await fetch(p).then(r=>{if(!r.ok)throw r.status;return r.text();});content.innerHTML=marked.parse(md);renderMermaid();mountViewers();window.scrollTo(0,0);}
  catch(e){content.innerHTML="<h1>Couldn't load document</h1><p>"+p+" ("+e+")</p>";}
}
function current(){const h=decodeURIComponent(location.hash.slice(1));return DOCS.find(d=>d.p===h)?h:DOCS[0].p;}
function render(){show(current());}
window.addEventListener("hashchange",render);
// follow .md links inside rendered docs
content.addEventListener("click",e=>{const a=e.target.closest("a");if(!a)return;const href=a.getAttribute("href")||"";if(/\.md(#|$)/.test(href)){e.preventDefault();const fn=href.split("/").pop().split("#")[0];const hit=DOCS.find(d=>d.p.endsWith("/"+fn)||d.p.endsWith(fn));if(hit)location.hash=hit.p;}});
render();
</script>
</body>
</html>
